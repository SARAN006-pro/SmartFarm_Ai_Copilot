services:
  - type: web
    name: smartfarm-api
    runtime: python
    rootDir: backend
    buildCommand: pip install --upgrade pip --no-cache-dir && pip install -r requirements.txt --no-cache-dir
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENROUTER_API_KEY
        value: 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
        sync: false
      - key: MODEL_NAME
        value: mistralai/mistral-7b-instruct
      - key: DATA_DIR
        value: /data
    disk:
      name: smartfarm-data
      mountPath: /data
      sizeGB: 1
